aid: range-resources
name: Range Resources
description: >-
  Range Resources is an independent natural gas, natural gas liquids, and oil
  company engaged in the exploration, development, and acquisition of natural
  gas and oil properties primarily in the Appalachian region. Range does not
  publish a public developer API; this index tracks the company's public-facing
  digital properties for reference.
